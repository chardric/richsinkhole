# Upstream NTP sources
pool pool.ntp.org     iburst minpoll 5 maxpoll 8
server time.cloudflare.com iburst
server time.google.com     iburst

# Serve time to all RFC-1918 LAN ranges
allow 10.0.0.0/8
allow 172.16.0.0/12
allow 192.168.0.0/16

# If all upstream sources are unreachable, still serve using local clock
# (stratum 10 signals "last resort" to clients)
local stratum 10

# Step the clock on the first 3 updates if offset > 1 second
# (handles large initial offsets cleanly instead of slowly slewing)
makestep 1.0 3

# Persist drift estimate across restarts
driftfile /var/lib/chrony/drift

# Logging
logdir /var/log/chrony
log tracking measurements
