server:
    # Listen on all interfaces (Docker internal network only)
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only allow queries from Docker internal network
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
    access-control: 192.168.0.0/16 allow

    # ----------------------------------------------------------------
    # Privacy — hide server identity
    # ----------------------------------------------------------------
    hide-identity: yes
    hide-version: yes
    identity: ""

    # ----------------------------------------------------------------
    # DNSSEC
    # ----------------------------------------------------------------
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    harden-dnssec-stripped: yes
    val-clean-additional: yes

    # ----------------------------------------------------------------
    # Hardening against spoofing / poisoning
    # ----------------------------------------------------------------
    harden-glue: yes
    harden-short-bufsize: yes
    harden-large-queries: yes
    harden-referral-path: no
    harden-algo-downgrade: yes
    use-caps-for-id: yes          # 0x20 randomization — makes spoofing harder
    deny-any: yes                 # DROP ANY queries (used in amplification attacks)
    harden-below-nxdomain: yes

    # ----------------------------------------------------------------
    # Per-zone DNSSEC exceptions
    # ----------------------------------------------------------------
    # icloudph.com (ISU Cauayan SIAS portal): registrar has 9 stale RSASHA256 DS
    # records at .com pointing to retired keys; the zone now publishes only
    # ECDSAP256SHA256 keys. Cloudflare/Quad9 accept (RFC 6840 — one valid chain
    # is enough), but harden-algo-downgrade rejects. Forwarders still validate
    # DNSSEC upstream, so spoofing protection on the network path is unchanged.
    # Remove this line if the zone owner cleans up the stale DS records.
    domain-insecure: "icloudph.com"

    # ----------------------------------------------------------------
    # DNS Rebinding protection — refuse private IPs in public DNS answers
    # ----------------------------------------------------------------
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 127.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # ----------------------------------------------------------------
    # Rate limiting — mitigate brute-force / amplification
    # ----------------------------------------------------------------
    ratelimit: 1000               # max queries/s per client IP
    ratelimit-size: 4m
    ratelimit-factor: 10          # still allow 1/10th through (legitimate bursts)
    ip-ratelimit: 1000            # per-IP limit
    ip-ratelimit-size: 4m

    # ----------------------------------------------------------------
    # Privacy — QNAME minimisation (RFC 7816)
    # ----------------------------------------------------------------
    qname-minimisation: yes
    qname-minimisation-strict: no  # relaxed for compatibility

    # ----------------------------------------------------------------
    # Performance / caching
    # ----------------------------------------------------------------
    cache-min-ttl: 300             # 5 min minimum — reduces re-queries for low-TTL CDNs
    cache-max-ttl: 86400
    cache-max-negative-ttl: 600    # cache NXDOMAIN for 10 min
    neg-cache-size: 4m
    msg-cache-size: 32m            # reduced for Pi 3B (saves ~32MB RAM)
    rrset-cache-size: 64m          # reduced for Pi 3B (saves ~64MB RAM)
    num-threads: 2
    prefetch: yes                  # re-fetch popular entries before TTL expires
    prefetch-key: yes
    serve-expired: yes             # serve stale cache while refreshing in background
    serve-expired-ttl: 86400       # serve stale up to 24h — always respond fast
    serve-expired-client-timeout: 1800  # 1.8s timeout then serve stale + refresh in bg
    infra-cache-numhosts: 10000    # remember upstream server RTT for faster routing

    # Aggressive NSEC — faster NXDOMAIN (less upstream queries)
    aggressive-nsec: yes

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    verbosity: 1
    log-queries: no               # keep off for performance; enable to debug
    log-replies: no

    # ----------------------------------------------------------------
    # Misc
    # ----------------------------------------------------------------
    do-not-query-localhost: yes
    minimal-responses: yes
    rrset-roundrobin: yes

# ----------------------------------------------------------------
# Remote control — allows unbound-control reload
# ----------------------------------------------------------------
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    server-key-file: "/etc/unbound/unbound_server.key"
    server-cert-file: "/etc/unbound/unbound_server.pem"
    control-key-file: "/etc/unbound/unbound_control.key"
    control-cert-file: "/etc/unbound/unbound_control.pem"

# ----------------------------------------------------------------
# Forward all queries to Quad9 (malware/phishing blocking) over TLS
# Fallback: Cloudflare
# ----------------------------------------------------------------
forward-zone:
    name: "."
    forward-tls-upstream: no

    # Quad9 (blocks malware, phishing, spyware by threat intel)
    forward-addr: 9.9.9.9
    forward-addr: 149.112.112.112

    # Cloudflare fallback
    forward-addr: 1.1.1.1
    forward-addr: 1.0.0.1
