# RichSinkhole Lite — dnsmasq configuration.
# Drop in /etc/dnsmasq.d/rs-lite.conf and run: systemctl restart dnsmasq

# Listen on all interfaces, but ignore non-LAN packets explicitly later if you
# add a firewall rule. The Pi Zero is a LAN-only resolver here.
port=53
interface=eth0
bind-dynamic

# Forwarders.
no-resolv
server=1.1.1.1
server=9.9.9.9

# Cache + behaviour.
cache-size=4096
neg-ttl=60
domain-needed
bogus-priv
stop-dns-rebind
rebind-localhost-ok

# Blocklist (generated by rs-lite-updater).
addn-hosts=/var/lib/rs-lite/blocked.hosts

# Query logging — required for the dashboard's "logs" view.
log-queries
log-facility=/var/log/rs-lite/dnsmasq.log
log-async=5
