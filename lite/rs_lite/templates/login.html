{% extends "base.html" %}
{% block title %}Sign in — RichSinkhole Lite{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-brand">
    <div class="mark">RichSinkhole<span class="tag">Lite</span></div>
    <div class="sub">DNS sinkhole · admin console</div>
  </div>

  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="hint">Enter the admin password for this device.</p>
    <form method="post">
      <label>Password
        <input type="password" name="password" autocomplete="current-password" autofocus required>
      </label>
      <button type="submit">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
