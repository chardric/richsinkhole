{% extends "base.html" %}
{% block title %}First-run setup — RichSinkhole Lite{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-brand">
    <div class="mark">RichSinkhole<span class="tag">Lite</span></div>
    <div class="sub">First-run setup</div>
  </div>

  <div class="auth-card">
    <h1>Set admin password</h1>
    <p class="hint">There is no recovery — if you lose it you will have to
    reset <code>state.db</code> on the Pi.</p>
    <form method="post">
      <label>Password (8+ characters)
        <input type="password" name="password" autocomplete="new-password" required minlength="8" autofocus>
      </label>
      <label>Confirm password
        <input type="password" name="confirm" autocomplete="new-password" required minlength="8">
      </label>
      <button type="submit">Set password</button>
    </form>
  </div>
</div>
{% endblock %}
