<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — RichSinkhole</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
      filter: grayscale(0.2);
    }

    h1 {
      font-size: 5rem;
      font-weight: 800;
      color: #3b82f6;
      line-height: 1;
      letter-spacing: -2px;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #94a3b8;
      margin: 0.75rem 0 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    a.btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    a.btn:hover { background: #2563eb; }

    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">&#x2622;&#xfe0f;</span>
    <h1>404</h1>
    <h2>Nothing to see here</h2>
    <p>
      This address is protected by <strong>RichSinkhole</strong>.<br>
      The page you're looking for doesn't exist or isn't publicly accessible.
    </p>
    <div class="badge">
      <span class="dot"></span>
      DNS Sinkhole Active
    </div>
    <br>
    <a class="btn" href="/richsinkhole/">Open Dashboard</a>
    <div class="footer">RichSinkhole &mdash; Self-hosted DNS ad blocker</div>
  </div>
</body>
</html>
