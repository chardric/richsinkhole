worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker's internal DNS — re-resolves container IPs when containers restart
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Per-hostname reverse proxy rules managed by the dashboard
    include /etc/nginx/conf.d/*.conf;

    # ----------------------------------------------------------------
    # HTTP default — dashboard + captive portal + cert download
    # ----------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx;
            internal;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx;
            internal;
        }

        # Captive portal detection endpoints (iOS, Android, Windows, Linux, Firefox)
        location ~ ^/(hotspot-detect\.html|library/test/success\.html|connecttest\.txt|check_network_status\.txt|generate_204|success\.txt|ncsi\.txt|canonical\.html)$ {
            set $upstream http://dashboard:8080;
            rewrite ^/(.*)$ /captive/$1 break;
            proxy_pass         $upstream;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # CA cert download
        location = /ca.crt {
            alias /etc/nginx/certs/ca.crt;
            add_header Content-Disposition 'attachment; filename="richsinkhole-ca.crt"';
            add_header Content-Type 'application/x-x509-ca-cert';
        }

        # DNS-over-HTTPS
        location /dns-query {
            set $upstream http://dashboard:8080;
            rewrite ^/dns-query(.*)$ /dns-query$1 break;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Dashboard at /richsinkhole/
        location = /richsinkhole {
            return 301 /richsinkhole/;
        }

        location /richsinkhole/ {
            set $upstream http://dashboard:8080;
            rewrite ^/richsinkhole/(.*) /$1 break;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     86400s;
            chunked_transfer_encoding on;
        }

        location = / {
            return 301 /richsinkhole/;
        }

        location / {
            set $upstream http://dashboard:8080;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     86400s;
            chunked_transfer_encoding on;
        }
    }

    # ----------------------------------------------------------------
    # HTTPS — YouTube transparent proxy
    # ----------------------------------------------------------------
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # CA cert download over HTTPS too
        location = /ca.crt {
            alias /etc/nginx/certs/ca.crt;
            add_header Content-Disposition 'attachment; filename="richsinkhole-ca.crt"';
            add_header Content-Type 'application/x-x509-ca-cert';
        }

        # Apple mobileconfig
        location = /ca.mobileconfig {
            set $upstream http://dashboard:8080;
            proxy_pass         $upstream/ca.mobileconfig;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Transparent YouTube proxy — passes everything through, strips ads
        location / {
            set $upstream http://youtube-proxy:8000;
            proxy_pass             $upstream;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto https;
            proxy_buffering        off;
            proxy_read_timeout     60s;
            proxy_buffer_size      128k;
            proxy_buffers          4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
