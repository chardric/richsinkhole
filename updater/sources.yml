sources: []

update_interval_hours: 24

# Webhook notifications (optional — remove or leave webhook_url blank to disable)
notifications:
  webhook_url: ""
  events:
    - blocklist_updated
    - daily_summary
    - new_client

whitelist:
  - youtube.com
  - www.youtube.com
  - youtu.be
  - yt.be
  - m.youtube.com
  # Microsoft Edge service-ring endpoints required by Teams for service
  # discovery, routing and health checks. Upstream hosts lists (StevenBlack,
  # anudeepND) tag these as telemetry, but blocking them breaks Teams sign-in
  # and call connectivity.
  - a-ring.msedge.net
  - k-ring.msedge.net
  - fp.msedge.net
  # Office config/auth nexus — required for Teams sign-in. Tagged as telemetry
  # by some lists, but blocking it leaves Teams stuck on "Loading" / sign-in
  # failures across multiple clients.
  - nexus.officeapps.live.com
  # thenkiri.com download redirect target (flagged by TIF list).
  # Only allow the file host; thenkiri itself is not blocked.
  - downloadwella.com
  - www.downloadwella.com
