services:
  ntp:
    build: ./ntp
    ports:
      - "0.0.0.0:123:123/udp"
    cap_add:
      - SYS_TIME
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  unbound:
    build: ./unbound
    restart: unless-stopped
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sinkhole:
    build:
      context: .
      dockerfile: sinkhole/Dockerfile
    depends_on:
      - unbound
    ports:
      - "0.0.0.0:53:53/udp"
      - "0.0.0.0:53:53/tcp"
    environment:
      HOST_IP: ${HOST_IP:-}
      HTTP_PORT: ${HTTP_PORT:-80}
      TZ: ${TZ:-Asia/Manila}
      ROOT_PATH: /richsinkhole
      NGINX_CONTAINER: richsinkhole-nginx-1
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${DATA_DIR:-./data}/config:/config
      - ./updater/sources.yml:/updater/sources.yml
      - ./nginx/certs:/certs:ro
      - ./nginx/conf.d:/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${BACKUP_DIR:-/mnt/nas/richsinkhole-backups}:/mnt/nas/richsinkhole-backups
      - /usr/local/bin/sinkhole-backup.sh:/usr/local/bin/sinkhole-backup.sh:ro
    dns:
      - 9.9.9.9
      - 1.1.1.1
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 640m
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/${NGINX_CONFIG:-nginx-standalone.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/404.html:/usr/share/nginx/404.html:ro
      - ./nginx/50x.html:/usr/share/nginx/50x.html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - sinkhole
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

